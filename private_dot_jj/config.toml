[operation]
mode = "snapshot"
auto-update-interval = "7d"

[user]
name = "William Phetsinorath"
email = "william.phetsinorath@shikanime.studio"

[signing]
backend = "gpg"
key = "EA3CE20AC83A347C"

[ui]
default-command = "log"
pager = "less -FRX"
editor = "hx"

[git]
auto-local-branch = true
push-bookmark-prefix = "push-"

[revset-aliases]
"trunk()" = "main@origin"

[aliases]
l = ["log", "-r", "(main..@):: | (..main)~@"]
s = ["status"]
n = ["new"]
co = ["checkout"]
br = ["branch"]
